# docker-compose.yml (추가 부분)
services:
  mariadb:
    image: mariadb:10.11
    container_name: sensor-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sensor_db
      MYSQL_USER: sensor_user
      MYSQL_PASSWORD: sensor_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    restart: always

volumes:
  mariadb_data:
